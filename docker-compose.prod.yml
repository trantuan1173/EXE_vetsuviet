version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: vsv-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: vetsuviet
    networks:
      - vsv-network

  backend:
    image: docker.io/${DOCKERHUB_USERNAME}/vsv-backend:latest
    container_name: vsv-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 3456
      MONGO_URI: mongodb://mongo:27017/vetsuviet
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      CLIENT_URL: ${CLIENT_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-vetsuviet-videos}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: "true"
      VIDEO_PLAYBACK_URL_TTL_SECONDS: ${VIDEO_PLAYBACK_URL_TTL_SECONDS:-600}
      MAX_VIDEO_SIZE_BYTES: ${MAX_VIDEO_SIZE_BYTES:-5368709120}
    ports:
      - "3456:3456"
    networks:
      - vsv-network

  frontend:
    image: docker.io/${DOCKERHUB_USERNAME}/vsv-frontend:latest
    container_name: vsv-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3455:80"
    networks:
      - vsv-network

volumes:
  mongo_data:
    driver: local

networks:
  vsv-network:
    driver: bridge
