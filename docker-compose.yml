version: "3.8"

# ═══════════════════════════════════════════════════════════
#  Vết Sử Việt — Docker Compose
#  Gồm 3 services: MongoDB, Backend (Express), Frontend (Nginx)
#
#  Cách chạy:
#    docker compose up -d --build
#
#  Truy cập:
#    - Frontend:  http://localhost
#    - API:       http://localhost/api
#    - API docs:  http://localhost/api/docs
#    - MongoDB:   localhost:27017
# ═══════════════════════════════════════════════════════════

services:
  # ── MongoDB ─────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: vsv-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: vetsuviet
    networks:
      - vsv-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Node / Express) ────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vsv-backend
    restart: unless-stopped
    ports:
      - "3456:3456"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 3456
      MONGO_URI: mongodb://mongo:27017/vetsuviet
      JWT_SECRET: ${JWT_SECRET:-vetsuviet_jwt_secret_change_me}
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      CLIENT_URL: http://localhost:3455
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@vetsuviet.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-Vết Sử Việt Admin}
      # ── External MinIO / S3 config ────────────────────────────
      # Để test local không cần MinIO, bạn có thể comment các biến S3_
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-vetsuviet-videos}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: "true"
      VIDEO_PLAYBACK_URL_TTL_SECONDS: ${VIDEO_PLAYBACK_URL_TTL_SECONDS:-600}
      MAX_VIDEO_SIZE_BYTES: ${MAX_VIDEO_SIZE_BYTES:-5368709120}
      # ── Email (Gmail SMTP) ────────────────────────────────────
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
    networks:
      - vsv-network

  # ── Frontend (React + Nginx) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: vsv-frontend
    restart: unless-stopped
    ports:
      - "3455:80"
    depends_on:
      - backend
    networks:
      - vsv-network

volumes:
  mongo_data:
    driver: local

networks:
  vsv-network:
    driver: bridge
